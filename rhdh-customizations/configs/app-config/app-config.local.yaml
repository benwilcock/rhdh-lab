# Copy this file to app-config.local.yaml to override default app settings.
# Example with GitHub integration referencing external secrets file.
auth:
  environment: development # Use 'production' to disable Guest login
  providers:
    github:
      development: # Development environment
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        signIn: 
          resolvers: # This is the resolver that will be used to match the GitHub username with the user entity in the catalog
            - resolver: usernameMatchingUserEntityName
        # Enable GitHub as sign-in provider (uncomment to make GitHub the primary auth)
        # signInPage: github

permission:
  enabled: true
  rbac:
    admin:
      superUsers:
        - name: user:default/benwilcock
      users: 
        - name: user:default/benwilcock
      pluginsWithPermission:
        - catalog
        - scaffolder
        - permission
        - extensions
        - scorecard

integrations:
  github: # GitHub integration configuration
    - host: github.com
      token: ${GITHUB_TOKEN}
      apps:
        - $include: ../extra-files/github-app-credentials.yaml # Include the GitHub App credentials file
    # Parasol Insurance internal GitHub Enterprise (fictional -- suppresses SCM auth warnings for parasol-catalog entities)
    - host: github.parasol.com
      apiBaseUrl: https://github.parasol.com/api/v3
      token: parasol-fictional-catalog-placeholder

app:
  title: "RHDH - All your base are belong to us!"
  baseUrl: ${BASE_URL}
  # branding: uses RHDH built-in defaults (no overrides)
  # To customize, see: https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.6/html/customizing_red_hat_developer_hub/customizing-appearance
  analytics:
    adoptionInsights:
      maxBufferSize: 25
      flushInterval: 6000
      debug: true # enable this to debug
      licensedUsers: 5

backend:
  # Allow the catalog PlaceholderProcessor to fetch external OpenAPI spec definitions
  # via $text substitution in API entity YAML files.
  reading:
    allow:
      - host: raw.githubusercontent.com
      - host: api.qdrant.tech
      - host: www.keycloak.org
  listen:
    port: 7007
  baseUrl: ${BASE_URL} # Set the preferred base URL to match your DNS record (e.g. https://rhdh.wibbles.duckdns.org). Omit backend.https so the backend serves HTTP (Caddy/reverse proxy terminates TLS).
  cors:
    origin: ${BASE_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  csp:
    upgrade-insecure-requests: false
    connect-src: ["'self'", 'http:', 'https:'] # ["'self'", "unsafe-eval", 'http:', 'https:']
    frame-src:
      - https://www.youtube.com
    img-src: ["'self'", "unsafe-eval", 'data:', 'http:', 'https:']
  # comment out the following 'database' section to use the PostgreSQL database
  database:
    client: better-sqlite3
    connection: ':memory:'
  auth:
    # backend.auth.keys removed (deprecated; was causing console warnings)
    # MCP external access: uncomment and set MCP_TOKEN in .env when using MCP clients.
    # Without MCP_TOKEN set, the backend fails to start if this block is present.
    # externalAccess:
    #   - type: static
    #     options:
    #       token: ${MCP_TOKEN}
    #       subject: mcp-clients
  actions:
    pluginSources:
      - software-catalog-mcp-tool
      - techdocs-mcp-tool


catalog: # You can use local files from catalog-entities directory to load entities into the catalog
  providers: # Ingest users and projects from the GitHub Org
    github:
      providerId:
        organization: "${GITHUB_ORG}"
        schedule:
          frequency:
            minutes: 30
          initialDelay:
            seconds: 15
          timeout:
            minutes: 15
    githubOrg:
      - id: organization
        githubUrl: "${GITHUB_HOST_DOMAIN}"
        orgs: [ "${GITHUB_ORG}" ]
        schedule:
          frequency:
            minutes: 30
          initialDelay:
            seconds: 15
          timeout:
            minutes: 15

  # Speed up the metadata refresh interval (when testing)
  processingInterval: { seconds: 60 }
  rules:
    - allow: [Component, API, Location, Template, Domain, User, Group, System, Resource, Plugin, Package] # Permissive entity rules

  locations:
    # Load the RHDH Local catalog entry (System)
    - type: file
      target: /opt/app-root/src/catalog-info.yaml
    # Load the RHDH Local default users and groups
    - type: file
      target: /opt/app-root/src/configs/catalog-entities/users.yaml
      rules:
        - allow: [User, Group]
    # Load custom user overrides (GitHub auth requires matching User entities)
    - type: file
      target: /opt/app-root/src/configs/catalog-entities/users.override.yaml
      rules:
        - allow: [User, Group]
    # Enterprise OSS catalog (GitHub) -- comment out to exclude from this demo environment.
    # Source: https://github.com/benwilcock/backstage-catalogs/blob/main/enterprise-catalog-index.yaml
    - type: url
      target: https://github.com/benwilcock/backstage-catalogs/blob/main/enterprise-catalog-index.yaml
      rules:
        - allow: [Location]
    # Parasol Insurance fictional catalog (GitHub) -- comment out to exclude from this demo environment.
    # Source: https://github.com/benwilcock/backstage-catalogs/blob/main/parasol-catalog-index.yaml
    - type: url
      target: https://github.com/benwilcock/backstage-catalogs/blob/main/parasol-catalog-index.yaml
      rules:
        - allow: [Location]
    # Load Frontend Dynamic Plugin Software Template.
    # Using this template in RHDH requires GitHub integration to be set up.
    - type: url
      target: https://github.com/redhat-developer/red-hat-developer-hub-software-templates/blob/main/templates/create-frontend-plugin/template.yaml
      rules:
        - allow: [Template]
    # Load Backend Dynamic Plugin Software Template.
    # Using this template in RHDH requires GitHub integration to be set up.
    - type: url
      target: https://github.com/redhat-developer/red-hat-developer-hub-software-templates/blob/main/templates/create-backend-plugin/template.yaml
      rules:
        - allow: [Template]
    # Load 'Create Tech Docs' Software Template
    # Using this template in RHDH requires GitHub integration to be set up.
    - type: url
      target: https://github.com/redhat-developer/red-hat-developer-hub-software-templates/blob/main/templates/github/techdocs/template.yaml
      rules:
        - allow: [Template]
    # Load 'Register Existing Component to Catalog' Software Template.
    # Using this template in RHDH requires GitHub integration to be set up.
    - type: url
      target: https://github.com/redhat-developer/red-hat-developer-hub-software-templates/blob/main/templates/github/register-component/template.yaml
      rules:
        - allow: [Template]

    # My RHDH TechDocs (Local files)
    # - type: file
    #   target: /opt/app-root/src/techdocs/rhdh-catalog-info.yaml
        
    # Red Hat developer Hub
    #- type: url
      #target: https://github.com/redhat-developer/rhdh/blob/main/catalog-info.yaml

    ## AI-Powered Customer Service Platform Components
    ## Filter for System: AI-Powered Customer Service Platform
