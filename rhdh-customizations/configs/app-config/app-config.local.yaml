dynamicPlugins:
  frontend:
    default.main-menu-items:
      menuItems:
        default.my-group:
          enabled: false

buildInfo:
  title: 'RHDH Version Info'
  card:
    TechDocs builder: 'local'
    Authentication provider: 'GitHub (Org)'
    RBAC: enabled
  full: false

i18n: # Localisation & translation settings. Translation JSON files are mounted at /opt/app-root/src/translations/ via compose.override.yaml volume mount.
  locales: # List of supported locales. Must include en, otherwise the translation framework will fail to load.
    - en
    - fr
    - ja
    - it
  defaultLocale: en # Optional. Defaults to en if not specified.

jira:
  baseUrl: ${JIRA_BASE_URL}
  token: ${JIRA_TOKEN}
  product: cloud # Change to 'datacenter' if using Jira Data Center

scorecard:
  plugins:
    github:
      open_prs:
        thresholds:
          rules:
            - key: success
              expression: '<10'
            - key: warning
              expression: '10-50'
            - key: error
              expression: '>50'
    jira:
      open_issues:
        options:
          mandatoryFilter: resolution = Unresolved
        thresholds:
          rules:
            - key: success
              expression: '<500'
            - key: warning
              expression: '500-2000'
            - key: error
              expression: '>2000'
