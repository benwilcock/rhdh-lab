techdocs:
  generator:
    runIn: local
  builder: local
  publisher:
    type: local
    local:
      publishDirectory: /tmp/techdocs
  sanitizer:
    allowedIframeHosts:
      - www.youtube.com # Allows embedding of YouTube videos in TechDocs

proxy:
  endpoints:
    '/quay/api':
      target: 'https://quay.io'
      credentials: require
      headers:
        X-Requested-With: 'XMLHttpRequest'
        # Uncomment and use the Authorization header below to access a private Quay
        # Repository using a token. Refer to the "Applications and Tokens" section
        # at https://docs.quay.io/api/ to find the instructions to generate a token
        # Authorization: 'Bearer <YOUR TOKEN>'
      changeOrigin: true
      # Change to "false" in case of using self hosted quay instance with a self-signed certificate
      secure: true
    '/ai-rssfeed':
      target: "https://news.mit.edu/rss/topic/artificial-intelligence2" # https://github.com/vishalshar/awesome_ML_AI_RSS_feed?tab=readme-ov-file
      changeOrigin: true
      followRedirects: true

quay:
  # The BASE url for the Quay service, used to generate the link to Quay
  uiUrl: 'https://quay.io'

